<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify Email | Samsoftpay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card {
      width: 100%; max-width: 440px; background: white;
      border-radius: 16px; border: 1px solid #e2e8f0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      padding: 2.5rem; margin: 1.5rem;
    }
    .icon-wrap {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(99,102,241,0.1);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-wrap svg { width: 32px; height: 32px; color: #6366f1; }
    h2 { font-size: 1.5rem; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 0.5rem; }
    p { color: #64748b; text-align: center; font-size: 0.9375rem; line-height: 1.6; margin-bottom: 1.75rem; }
    .otp-inputs { display: flex; gap: 0.625rem; justify-content: center; margin-bottom: 1.5rem; }
    .otp-inputs input {
      width: 48px; height: 56px; text-align: center;
      font-size: 1.5rem; font-weight: 700; font-family: monospace;
      border: 2px solid #e2e8f0; border-radius: 8px;
      transition: all 0.2s;
    }
    .otp-inputs input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .btn-submit {
      width: 100%; padding: 0.875rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(99,102,241,0.3); }
    .error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #dc2626; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.25rem; text-align: center; }
    .info { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.25); color: #1d4ed8; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.25rem; text-align: center; }
    .resend { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: #64748b; }
    .resend button { background: none; border: none; color: #6366f1; font-weight: 600; cursor: pointer; font-family: inherit; font-size: inherit; }
    .resend button:hover { text-decoration: underline; }
    #code-hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <h2>Check your email</h2>
    <p>We sent a 6-digit verification code to <strong>{{ current_user.email }}</strong>. Enter it below to verify your account.</p>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if info %}<div class="info">{{ info }}</div>{% endif %}

    <form method="POST" action="{{ url_for('auth.verify_email') }}" id="otp-form">
      <input type="hidden" name="code" id="code-hidden">
      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      </div>
      <button type="submit" class="btn-submit">Verify Email</button>
    </form>

    <div class="resend">
      Didn't receive it?
      <form method="POST" action="{{ url_for('auth.resend_verification') }}" style="display:inline;">
        <button type="submit">Resend code</button>
      </form>
    </div>
  </div>

  <script>
    const digits = document.querySelectorAll('.otp-digit');
    digits[0].focus();
    digits.forEach((el, i) => {
      el.addEventListener('input', () => {
        if (el.value && i < digits.length - 1) digits[i + 1].focus();
        syncHidden();
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !el.value && i > 0) digits[i - 1].focus();
      });
      el.addEventListener('paste', e => {
        const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        paste.split('').forEach((ch, j) => { if (digits[i + j]) digits[i + j].value = ch; });
        syncHidden();
        e.preventDefault();
      });
    });
    function syncHidden() {
      document.getElementById('code-hidden').value = [...digits].map(d => d.value).join('');
    }
    document.getElementById('otp-form').addEventListener('submit', syncHidden);
  </script>
</body>
</html>
