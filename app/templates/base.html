<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PesaDemo {% block title %}{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem auto; max-width: 960px; padding: 0 1rem; color: #222; }
    h1, h2 { color: #1a1a1a; }
    a { color: #0a66c2; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border-bottom: 1px solid #eee; padding: 0.5rem 0.75rem; text-align: left; font-size: 0.9rem; }
    th { background: #fafafa; }
    .status-pending, .status-authorized { color: #b88600; }
    .status-succeeded { color: #1a7f37; }
    .status-failed { color: #c1303a; }
    .card { background: #fafafa; padding: 1rem 1.25rem; border-radius: 8px; margin: 0.5rem 0; }
    code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85em; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    .balance { font-size: 1.5rem; font-weight: 600; }
  </style>
</head>
<body>
<nav>
  <a href="{{ url_for('dashboard.index') }}">Home</a>
  <a href="{{ url_for('dashboard.list_merchants') }}">Merchants</a>
  <a href="{{ url_for('dashboard.reconciliation') }}">Reconciliation</a>
</nav>
{% block content %}{% endblock %}
</body>
</html>
