<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | Samsoftpay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .login-wrap {
      width: 100%; max-width: 440px;
      background: white; border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      padding: 2.5rem;
      margin: 1.5rem;
    }

    .logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 1.125rem; font-weight: 700; color: #0f172a; }
    .logo-sub { font-size: 0.8rem; color: #6366f1; font-weight: 600; }

    h2 { font-size: 1.625rem; font-weight: 700; color: #0f172a; margin-bottom: 0.375rem; }
    .subtitle { color: #64748b; font-size: 0.9375rem; margin-bottom: 2rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #334155; margin-bottom: 0.5rem; }
    .form-input {
      width: 100%; padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0; border-radius: 8px;
      font-size: 0.9375rem; font-family: inherit; color: #0f172a;
      transition: all 0.2s;
    }
    .form-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

    .btn-submit {
      width: 100%; padding: 0.875rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.3s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.35); }

    .error-box {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
      color: #dc2626; border-radius: 8px; padding: 0.875rem 1rem;
      font-size: 0.9rem; margin-bottom: 1.5rem;
    }

    .auth-footer { margin-top: 1.75rem; text-align: center; font-size: 0.9rem; color: #64748b; }
    .auth-footer a { color: #6366f1; font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .back-link { display: inline-flex; align-items: center; gap: 0.375rem; color: #6366f1; font-size: 0.875rem; text-decoration: none; margin-bottom: 1.5rem; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 7v10l8 5 8-5V7l-8-5z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <div>
        <div class="logo-text">Sam Soft</div>
        <div class="logo-sub">Pay</div>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your merchant dashboard.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email"
          value="{{ form.email if form else '' }}"
          placeholder="you@yourbusiness.com" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
          placeholder="Your password" required>
      </div>

      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.signup_page') }}">Create one free</a>
    </div>
  </div>
</body>
</html>
