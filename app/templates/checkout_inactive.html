<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment link unavailable</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #faf8f4; color: #1a1814; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 2rem 1rem; }
    .card { max-width: 460px; background: white; border: 1px solid #e6e1d6; padding: 2.5rem 2.25rem; border-radius: 4px; text-align: center; }
    h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 1.75rem; margin: 0 0 1rem; }
    p { color: #6b665d; }
  </style>
</head>
<body>
  <div class="card">
    <h1>This link is no longer active</h1>
    <p>The payment link from {{ merchant.name }} has been deactivated. Please contact them for a new link.</p>
  </div>
</body>
</html>
