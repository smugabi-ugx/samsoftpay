services:
  - type: web
    name: samsoftpay
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -
    preDeployCommand: python -m flask --app run.py db upgrade
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: samsoftpay-db
          property: connectionString
      # Add these manually in the Render dashboard after first deploy:
      # MOMO_USE_REAL, MOMO_SUBSCRIPTION_KEY, MOMO_API_USER, MOMO_API_KEY
      # MOMO_DISBURSEMENT_SUBSCRIPTION_KEY, MOMO_DISBURSEMENT_API_USER, MOMO_DISBURSEMENT_API_KEY
      # FLUTTERWAVE_SECRET_KEY
      # CHANGENOW_API_KEY, CHANGENOW_RECEIVING_ADDRESS
      # MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD

databases:
  - name: samsoftpay-db
    databaseName: samsoftpay
    user: samsoftpay
    plan: free
